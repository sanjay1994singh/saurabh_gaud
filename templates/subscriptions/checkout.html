{% extends "base.html" %}

{% block title %}Payment{% endblock %}

{% block content %}
  <section class="auth-page">
    <div class="auth-panel">
      <p class="eyebrow">Secure Payment</p>
      <h1>{{ plan.name }}</h1>
      <p class="checkout-amount">Rs. {{ plan.amount }}</p>
      <button id="pay-button" class="primary-action" type="button">Pay with Razorpay</button>
      <a class="secondary-action" href="{% url 'subscriptions:plans' %}">Cancel</a>

      <form id="payment-form" method="post" action="{% url 'subscriptions:payment_success' %}">
        {% csrf_token %}
        <input type="hidden" name="razorpay_order_id" value="{{ razorpay_order_id }}">
        <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
        <input type="hidden" name="razorpay_signature" id="razorpay_signature">
      </form>
    </div>
  </section>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const payButton = document.getElementById("pay-button");
    const paymentForm = document.getElementById("payment-form");

    payButton.addEventListener("click", function () {
      const options = {
        key: "{{ razorpay_key_id }}",
        amount: "{{ amount_paise }}",
        currency: "INR",
        name: "Dharm Raksha Sangh",
        description: "{{ plan.name|escapejs }}",
        order_id: "{{ razorpay_order_id }}",
        prefill: {
          name: "{{ request.user.get_full_name|default:request.user.username|escapejs }}",
          email: "{{ request.user.email|escapejs }}",
          contact: "{{ request.user.phone|escapejs }}"
        },
        handler: function (response) {
          document.getElementById("razorpay_payment_id").value = response.razorpay_payment_id;
          document.getElementById("razorpay_signature").value = response.razorpay_signature;
          paymentForm.submit();
        },
        theme: {
          color: "#d87922"
        }
      };
      const checkout = new Razorpay(options);
      checkout.open();
    });
  </script>
{% endblock %}
