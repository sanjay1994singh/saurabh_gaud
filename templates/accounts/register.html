{% extends "base.html" %}

{% block title %}Join Membership{% endblock %}

{% block content %}
  <section class="auth-page">
    <div class="auth-panel">
      <p class="eyebrow">Join Membership</p>
      <h1>Create your account</h1>
      <a class="social-button" href="{% url 'social:begin' 'google-oauth2' %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}">
        Continue with Google
      </a>
      <div class="auth-divider"><span>or</span></div>
      <form method="post" class="form-stack">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
          <label>
            <span>{{ field.label }}</span>
            {{ field }}
            {{ field.errors }}
          </label>
        {% endfor %}
        <button class="primary-action" type="submit">Create account</button>
      </form>
      <p class="form-note">Already registered? <a class="text-link" href="{% url 'login' %}">Login</a></p>
    </div>
  </section>
{% endblock %}
